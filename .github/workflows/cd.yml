name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ══ 创建 / 复用 Release（单仓） ═════════════════════════════════════════
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            let release
            try {
              const r = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag,
              })
              release = r.data
            } catch {
              const r = await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag, name: `Kite VPN ${tag}`,
                body: `## Kite VPN ${tag}\n\n跨平台代理客户端，内置多订阅聚合。`,
                draft: false, prerelease: false,
              })
              release = r.data
            }
            return release.id

  # ══ 桌面端：tauri-action 构建 + 签名 + 产出 latest.json + 上传 ═══════════
  desktop:
    needs: create-release
    name: Desktop (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
          # 用 Ubuntu 22.04 (GLIBC 2.35) 而不是 latest，向下兼容 Fedora 38+ /
          # Debian 11+ / RHEL 9 等老一点的发行版，避免 GLIBC_2.3x not found。
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/engine/go.sum

      - name: Download Go modules
        working-directory: packages/engine
        env:
          GOPROXY: https://proxy.golang.org,https://goproxy.io,direct
        run: go mod download

      - name: Build mihomo sidecar
        shell: bash
        run: |
          cd packages/engine
          EXT=""; [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          mkdir -p ../../apps/desktop/src-tauri/binaries
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -tags with_gvisor -ldflags "-s -w" \
            -o ../../apps/desktop/src-tauri/binaries/mihomo-${{ matrix.target }}${EXT} .

      - name: Download GeoIP
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          curl -sL -o apps/desktop/src-tauri/resources/geoip.dat https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geoip.dat
          curl -sL -o apps/desktop/src-tauri/resources/geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geosite.dat
          curl -sL -o apps/desktop/src-tauri/resources/country.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/country.mmdb

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm
          # libayatana-appindicator3-dev：Fedora / 大多数 Linux 桌面托盘标准
          # rpm 工具：tauri-bundler 生成 .rpm 时用到

      - name: Build frontend
        run: pnpm -w run build

      # tauri-action：自动构建 + 签名 bundle + 生成 latest.json 并上传到 release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          # 合并多平台 manifest 到同一个 latest.json
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: false

  # ══ Android：APK 上传到同一个 release ═══════════════════════════════════
  android:
    needs: create-release
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/mobile/src-tauri

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/engine/go.sum

      - name: Build mihomo for Android
        env:
          GOPROXY: https://proxy.golang.org,https://goproxy.io,direct
          GONOSUMCHECK: "*"
        run: |
          cd packages/engine
          mkdir -p ../../apps/mobile/src-tauri/libs/arm64-v8a
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 \
            go build -trimpath -tags with_gvisor -ldflags "-s -w" \
            -o ../../apps/mobile/src-tauri/libs/arm64-v8a/libmihomo .

      - name: Build frontend
        run: pnpm -w run build

      - name: Init Android + VPN overlay
        run: cd apps/mobile && bash setup-android.sh

      - name: Build APK
        run: cd apps/mobile && npx @tauri-apps/cli android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: apps/mobile/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

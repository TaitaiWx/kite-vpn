name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ══ 桌面端：构建 + 上传到 GitHub Release ══
  desktop:
    name: Desktop (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/engine/go.sum

      - name: Build mihomo sidecar
        shell: bash
        run: |
          cd packages/engine
          EXT=""; [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          mkdir -p ../../apps/desktop/src-tauri/binaries
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -tags with_gvisor -ldflags "-s -w" \
            -o ../../apps/desktop/src-tauri/binaries/mihomo-${{ matrix.target }}${EXT} .

      - name: Download GeoIP
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources
          curl -sL -o apps/desktop/src-tauri/resources/geoip.dat https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geoip.dat
          curl -sL -o apps/desktop/src-tauri/resources/geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geosite.dat
          curl -sL -o apps/desktop/src-tauri/resources/country.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/country.mmdb

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build frontend
        run: pnpm -w run build

      - name: Build Tauri app
        working-directory: apps/desktop
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Kite VPN ${{ github.ref_name }}'
          body: |
            ## Kite VPN ${{ github.ref_name }}

            跨平台代理客户端，内置多订阅聚合。
          files: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══ Android：构建 APK + 上传到 Release ══
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: packages/engine/go.sum

      - name: Build mihomo for Android
        run: |
          cd packages/engine
          mkdir -p ../../apps/mobile/src-tauri/libs/arm64-v8a
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 \
            go build -trimpath -tags with_gvisor -ldflags "-s -w" \
            -o ../../apps/mobile/src-tauri/libs/arm64-v8a/libmihomo .

      - name: Build frontend
        run: pnpm -w run build

      - name: Init Android
        run: cd apps/mobile && npx @tauri-apps/cli android init

      - name: Build APK
        run: cd apps/mobile && npx @tauri-apps/cli android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══ iOS（需要 Apple 开发者账号）══
  ios:
    name: iOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Build frontend
        run: pnpm -w run build

      - name: Init & Build iOS
        run: |
          cd apps/mobile
          npx @tauri-apps/cli ios init
          npx @tauri-apps/cli ios build

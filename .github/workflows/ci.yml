name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          pnpm -w run build:types
          pnpm -w run build:core
          pnpm --filter @kite-vpn/ui typecheck

      - name: Unit tests
        run: pnpm --filter @kite-vpn/core test

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -w run build

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create placeholder sidecar
        run: |
          mkdir -p apps/desktop/src-tauri/binaries apps/desktop/src-tauri/resources
          touch apps/desktop/src-tauri/binaries/mihomo-x86_64-unknown-linux-gnu
          touch apps/desktop/src-tauri/resources/.gitkeep

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: cd apps/desktop/src-tauri && cargo check

# Kite Backend Ingress —— 走 nginx-ingress + cert-manager 自动签 Let's Encrypt
#
# 前置：
#   1. 集群里装好 ingress-nginx + cert-manager
#   2. cert-manager 里有个 ClusterIssuer 叫 letsencrypt-prod
#   3. 你域名 A/AAAA 指向集群 ingress IP
#
# Rate limit: ingress-nginx 用 annotation 控制，10 r/m 给 /api/auth/request-login
# 单 IP 防 magic-link 滥发。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kite-backend
  namespace: kite
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx-ingress 安全头 + rate limit
    nginx.ingress.kubernetes.io/proxy-body-size: 2m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kite.example.com
      secretName: kite-backend-tls
  rules:
    - host: kite.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kite-backend
                port:
                  name: http
---
# 单独一个 Ingress 给 /api/auth/request-login 加严格 rate limit
# （防止 magic-link 邮件被滥发）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kite-backend-auth-ratelimit
  namespace: kite
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/limit-rps: "1"     # 1 req/sec/IP
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kite.example.com
      secretName: kite-backend-tls
  rules:
    - host: kite.example.com
      http:
        paths:
          - path: /api/auth/request-login
            pathType: Exact
            backend:
              service:
                name: kite-backend
                port:
                  name: http

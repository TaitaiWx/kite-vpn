# 一键部署入口： kubectl apply -k apps/backend/k8s/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kite

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# 注：secret.yaml 不在这里 —— 你自己拷 secret.example.yaml 改值，单独 apply。
# nebula PKI secret 也单独 apply（kubectl create secret generic kite-nebula-pki）。

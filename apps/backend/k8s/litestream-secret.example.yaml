# Litestream S3 credentials —— 拷一份到 litestream-secret.yaml 改值后 apply。
# 不 apply 也行：sidecar 会 crashloop 但主容器不受影响（数据仅留在 PVC 里）。
#
# Cloudflare R2 / Backblaze B2 / MinIO / AWS S3 都行，路径不一样：
#   R2:  endpoint = https://<accountid>.r2.cloudflarestorage.com, region = auto
#   B2:  endpoint = https://s3.<region>.backblazeb2.com
#   AWS: endpoint = https://s3.<region>.amazonaws.com
apiVersion: v1
kind: Secret
metadata:
  name: kite-litestream-secret
  namespace: kite
type: Opaque
stringData:
  LITESTREAM_S3_ENDPOINT: https://your-account-id.r2.cloudflarestorage.com
  LITESTREAM_S3_BUCKET: kite-backups
  LITESTREAM_S3_PATH: kite-backend
  LITESTREAM_S3_REGION: auto
  LITESTREAM_S3_ACCESS_KEY_ID: REPLACE_ME
  LITESTREAM_S3_SECRET_ACCESS_KEY: REPLACE_ME

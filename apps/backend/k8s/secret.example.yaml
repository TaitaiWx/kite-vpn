# Kite secrets —— 部署时拷一份改成 secret.yaml，永远别 commit。
# 用法：
#   cp secret.example.yaml secret.yaml
#   $EDITOR secret.yaml   # 改值
#   kubectl apply -f secret.yaml
# 推荐用 sealed-secrets / sops-secrets-operator 把 secret.yaml 加密后入库。
apiVersion: v1
kind: Secret
metadata:
  name: kite-backend-env
  namespace: kite
type: Opaque
stringData:
  # 必填
  KITE_DOMAIN: kite.example.com
  KITE_PUBLIC_URL: https://kite.example.com
  KITE_FRONTEND_REDIRECT_URL: https://kite.example.com
  KITE_DATABASE_URL: sqlite:/var/lib/kite/kite.db
  KITE_BIND: 0.0.0.0:8787
  KITE_COOKIE_SECURE: "true"
  KITE_ADMIN_EMAIL: you@example.com

  # Mailer（Resend / Mailgun / Postmark 任选）
  KITE_MAILER: smtp
  KITE_SMTP_HOST: smtp.resend.com
  KITE_SMTP_PORT: "587"
  KITE_SMTP_USER: resend
  KITE_SMTP_PASS: REPLACE_ME
  KITE_SMTP_FROM_EMAIL: login@kite.example.com
  KITE_SMTP_FROM_NAME: Kite

  # Nebula lighthouse 子进程
  KITE_NEBULA_BIN: /usr/local/bin/nebula
  KITE_NEBULA_CONFIG: /etc/kite/nebula.yaml

  # 日志
  RUST_LOG: info,kite_backend=info,tower_http=warn

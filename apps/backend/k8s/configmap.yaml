apiVersion: v1
kind: ConfigMap
metadata:
  name: kite-litestream-config
  namespace: kite
data:
  # Litestream 持续把 SQLite WAL 流式复制到 S3-compatible 存储。
  # 任何 S3 兼容 (AWS S3 / Cloudflare R2 / Backblaze B2 / MinIO) 都行。
  # 配置 AK/SK 走 kite-litestream-secret，路径自己配。
  litestream.yml: |
    dbs:
      - path: /var/lib/kite/kite.db
        replicas:
          - type: s3
            endpoint: ${LITESTREAM_S3_ENDPOINT}
            bucket: ${LITESTREAM_S3_BUCKET}
            path: ${LITESTREAM_S3_PATH:-kite-backend}
            region: ${LITESTREAM_S3_REGION:-auto}
            access-key-id: ${LITESTREAM_S3_ACCESS_KEY_ID}
            secret-access-key: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
            # 每 10 秒同步 WAL，60 秒做一次 snapshot
            sync-interval: 10s
            snapshot-interval: 1m
            retention: 720h          # 30 天滚动
            retention-check-interval: 1h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kite-nebula-config
  namespace: kite
data:
  # Nebula lighthouse 配置 —— 部署前编辑这一段，把 IP 段 / 端口 调成你想要的
  nebula.yaml: |
    pki:
      ca: /etc/kite/pki/ca.crt
      cert: /etc/kite/pki/lighthouse.crt
      key: /etc/kite/pki/lighthouse.key
    static_host_map: {}
    lighthouse:
      am_lighthouse: true
      serve_dns: false
      interval: 60
    listen:
      host: "::"
      port: 4242
      read_buffer: 104857600
      write_buffer: 104857600
    punchy:
      punch: true
      respond: true
      delay: 1s
    tun:
      disabled: true
    firewall:
      outbound_action: drop
      inbound_action: drop
      conntrack:
        tcp_timeout: 12m
        udp_timeout: 3m
        default_timeout: 10m
      outbound:
        - port: any
          proto: any
          host: any
      inbound:
        - port: any
          proto: icmp
          host: any
    logging:
      level: info
      format: text
    stats:
      type: prometheus
      listen: 127.0.0.1:8424
      path: /metrics
      namespace: kite_lighthouse
      interval: 10s

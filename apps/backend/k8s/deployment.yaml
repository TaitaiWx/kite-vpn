# Kite Backend Deployment —— 一个 Pod 跑 axum + nebula lighthouse
#
# replicas: 1 因为 SQLite 是单写者（多副本会数据撕裂）。
# 横向扩展请先迁到 Postgres + 共享存储，但单家庭 / 单团队不需要。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kite-backend
  namespace: kite
  labels:
    app.kubernetes.io/name: kite-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    # SQLite + PVC：必须先停旧 Pod 再起新 Pod（避免双写）
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kite-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kite-backend
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      # Init container: 启动前从 S3 恢复 SQLite（如果是新 Pod / volume 空）
      # 已有数据时 litestream restore 不会覆盖，所以安全。
      initContainers:
        - name: litestream-restore
          image: litestream/litestream:0.3.13
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/lib/kite/kite.db ]; then
                echo "Empty volume detected — attempting Litestream restore..."
                litestream restore -if-replica-exists -config /etc/litestream/litestream.yml /var/lib/kite/kite.db || true
              else
                echo "kite.db exists — skipping restore"
              fi
          envFrom:
            - secretRef:
                name: kite-litestream-secret
                optional: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/kite
            - name: litestream-config
              mountPath: /etc/litestream/litestream.yml
              subPath: litestream.yml
              readOnly: true
      containers:
        - name: kite-backend
          image: ghcr.io/taitaiwx/kite-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
            - name: nebula
              containerPort: 4242
              protocol: UDP
          envFrom:
            - secretRef:
                name: kite-backend-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/kite
            - name: nebula-config
              mountPath: /etc/kite/nebula.yaml
              subPath: nebula.yaml
              readOnly: true
            - name: nebula-pki
              mountPath: /etc/kite/pki
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
              # Nebula 需要绑 UDP 4242 —— 但 4242 是 > 1024 的非特权端口，
              # 所以不需要 NET_BIND_SERVICE。这里全 drop。
        # Litestream sidecar: 持续把 WAL 流到 S3-compatible 存储
        # 不配 secret 时 sidecar 启动会 fail，所以默认禁用（k8s 部署后单独 apply 来开启）
        - name: litestream
          image: litestream/litestream:0.3.13
          args: ["replicate", "-config", "/etc/litestream/litestream.yml"]
          envFrom:
            - secretRef:
                name: kite-litestream-secret
                optional: true   # 没配 secret 时 sidecar crashloop，Pod 整体仍可用（主容器不依赖）
          volumeMounts:
            - name: data
              mountPath: /var/lib/kite
              readOnly: true
            - name: litestream-config
              mountPath: /etc/litestream/litestream.yml
              subPath: litestream.yml
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kite-backend-data
        - name: nebula-config
          configMap:
            name: kite-nebula-config
        - name: nebula-pki
          secret:
            secretName: kite-nebula-pki
            optional: false
        - name: litestream-config
          configMap:
            name: kite-litestream-config

# Kite 自托管部署 —— 一个 compose 文件起整套服务
#
# 用法（首次）：
#   1. cp .env.example .env  → 改里面的 KITE_DOMAIN / SMTP / 等
#   2. 把 CA 和 lighthouse 证书放到 ./pki/  (ca.crt / lighthouse.crt / lighthouse.key)
#      生成方式见 README.md "Lighthouse PKI" 一节
#   3. ./scripts/init-certbot.sh kite.example.com you@example.com  → 拿 TLS 证书
#   4. docker compose up -d
#
# 续 TLS 证书：certbot service 每天自动跑 renew。
#
# 升级 backend：
#   docker compose pull && docker compose up -d

name: kite

services:
  kite-backend:
    image: ghcr.io/taitaiwx/kite-backend:latest
    # 本地开发时用 build 而非 image:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: kite-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # backend 侦听 0.0.0.0（容器内），由 nginx 反代
      KITE_BIND: 0.0.0.0:8787
      KITE_NEBULA_BIN: /usr/local/bin/nebula
      KITE_NEBULA_CONFIG: /etc/kite/nebula.yaml
    volumes:
      - kite-data:/var/lib/kite           # SQLite db
      - ./pki:/etc/kite/pki:ro            # CA + lighthouse 证书
      - ./config/nebula.yaml:/etc/kite/nebula.yaml:ro
    ports:
      - "4242:4242/udp"                   # Nebula lighthouse
    # 不暴露 8787 到主机：只走 compose 网络给 nginx 反代

  nginx:
    image: nginx:1.27-alpine
    container_name: kite-nginx
    restart: unless-stopped
    depends_on:
      - kite-backend
    env_file:
      - .env
    environment:
      KITE_BACKEND_HOST: kite-backend
      KITE_BACKEND_PORT: "8787"
    volumes:
      - ./templates/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/acme:ro
    ports:
      - "80:80"
      - "443:443"
    # nginx 1.19+ 自动跑 /etc/nginx/templates/*.template → envsubst → /etc/nginx/conf.d/

  # 续 TLS 证书（每天 noon 自检；不到期不动）
  certbot:
    image: certbot/certbot:latest
    container_name: kite-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/acme
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/acme --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  kite-data:

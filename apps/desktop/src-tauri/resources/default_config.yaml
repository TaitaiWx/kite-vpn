# Kite 默认基础配置
# 顶层结构（port / dns / sniffer / proxy-groups 等）由 Kite 自己设计。
# rules 数组继承自一份典型机场订阅，经过脱敏 + 目标通用化处理：
#   - 订阅服务商基础设施域名（DNS / 控制面）全部剔除
#   - 所有专属代理组名（Netflix / HBO / 🎯Direct / ✈️Final 等）
#     统一折叠成 DIRECT / Proxy / REJECT，跟任何订阅都能配合使用
#
# 用户「订阅管理 → 添加订阅」导入节点后，节点会合并到 Proxy 组。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
find-process-mode: strict
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.localdomain'
  - '*.localhost'
  - '*.home.arpa'
  - '*.invalid'
  - '*.test'
  - +.pool.ntp.org
  - time.*.com
  - time.apple.com
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  - 1.0.0.1
  nameserver:
  - https://dns.google/dns-query
  - tls://8.8.8.8:853
  - 8.8.8.8
  fallback:
  - https://1.1.1.1/dns-query
  - tls://1.1.1.1:853
  - 1.1.1.1
sniffer:
  enable: true
  sniff:
    TLS:
      ports:
      - 443
    HTTP:
      ports:
      - 80
      - 8080
      - 8880
proxies: []
proxy-groups:
- name: Proxy
  type: select
  proxies:
  - DIRECT
rules:
- PROCESS-NAME,Weixin.exe,DIRECT
- DOMAIN,scholar.google.com,Proxy
